version: "3.9"

services:
  web:
    build: .
    container_name: chat-web
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: chat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:
